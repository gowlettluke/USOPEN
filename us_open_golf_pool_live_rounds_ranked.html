<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>U.S. Open Golf Pool Live Scores</title>
  <style>
    :root{
      --bg:#07100d; --panel:#0f1b17; --panel2:#13231e; --text:#eef8f2; --muted:#9db1a8;
      --line:#264238; --accent:#80f0b4; --bad:#ffb86b; --good:#8ff0c2; --shadow:0 18px 60px rgba(0,0,0,.35);
    }
    *{box-sizing:border-box}
    body{margin:0;font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;background:radial-gradient(circle at 20% 0%,#17362c 0,#07100d 38%,#050807 100%);color:var(--text)}
    header{position:sticky;top:0;z-index:5;background:rgba(7,16,13,.88);backdrop-filter:blur(12px);border-bottom:1px solid var(--line)}
    .wrap{max-width:1180px;margin:0 auto;padding:20px}
    .top{display:flex;gap:16px;justify-content:space-between;align-items:flex-end;flex-wrap:wrap}
    h1{margin:0;font-size:clamp(28px,5vw,54px);letter-spacing:-.05em;line-height:.95}.sub{color:var(--muted);margin-top:8px}.pill{display:inline-flex;gap:8px;align-items:center;border:1px solid var(--line);background:rgba(255,255,255,.04);border-radius:999px;padding:8px 12px;color:var(--muted);font-size:13px}.dot{width:9px;height:9px;border-radius:50%;background:#777}.dot.live{background:#31d982;box-shadow:0 0 0 7px rgba(49,217,130,.12)}
    .controls{display:flex;gap:8px;flex-wrap:wrap}.btn{border:1px solid var(--line);background:var(--panel2);color:var(--text);border-radius:12px;padding:10px 12px;font-weight:700;cursor:pointer}.btn:hover{border-color:var(--accent)}
    .grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:14px;margin-top:18px}@media(max-width:900px){.grid{grid-template-columns:repeat(2,1fr)}}@media(max-width:560px){.grid{grid-template-columns:1fr}.wrap{padding:14px}}
    .team{background:linear-gradient(180deg,rgba(255,255,255,.055),rgba(255,255,255,.02));border:1px solid var(--line);border-radius:22px;padding:16px;box-shadow:var(--shadow);position:relative}.team.rank1{border-color:rgba(128,240,180,.72);box-shadow:0 18px 60px rgba(0,0,0,.35),0 0 0 1px rgba(128,240,180,.22) inset}
    .teamHead{display:flex;justify-content:space-between;gap:10px;align-items:flex-start;margin-bottom:12px}.rankBadge{color:var(--muted);font-size:12px;font-weight:900;text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px}.name{font-size:24px;font-weight:900;letter-spacing:-.03em}.total{font-size:36px;font-weight:950;letter-spacing:-.05em;color:var(--accent)}.total small{font-size:12px;color:var(--muted);font-weight:700;letter-spacing:0;text-transform:uppercase;display:block;text-align:right}.players{display:grid;gap:8px}.player{display:grid;grid-template-columns:1fr auto;gap:8px;align-items:center;border-top:1px solid rgba(255,255,255,.08);padding-top:8px}.playerName{font-weight:800}.meta{color:var(--muted);font-size:12px}.score{font-size:20px;font-weight:900}.missing{color:var(--bad)}
    .board{margin-top:20px;background:rgba(15,27,23,.9);border:1px solid var(--line);border-radius:22px;box-shadow:var(--shadow);overflow:hidden}.board h2{margin:0;padding:16px 18px;border-bottom:1px solid var(--line);letter-spacing:-.03em}.tableWrap{overflow:auto}table{width:100%;border-collapse:collapse;min-width:720px}th,td{text-align:left;padding:11px 12px;border-bottom:1px solid rgba(255,255,255,.07);white-space:nowrap}th{color:var(--muted);font-size:12px;text-transform:uppercase;letter-spacing:.08em;background:rgba(255,255,255,.03)}td.scoreCell{font-weight:950;font-size:18px}.mine{background:rgba(128,240,180,.08)}.rank{color:var(--muted);font-variant-numeric:tabular-nums}.status{margin-top:12px;color:var(--muted);font-size:13px;line-height:1.45}.error{color:#ffb1a8}.fine{color:var(--good)}
  </style>
</head>
<body>
<header><div class="wrap top"><div><h1>U.S. Open Pool</h1><div class="sub" id="eventTitle">Loading live leaderboard…</div></div><div class="controls"><span class="pill"><span id="liveDot" class="dot"></span><span id="refreshText">Not updated yet</span></span><button class="btn" id="refreshBtn">Refresh now</button></div></div></header>
<main class="wrap"><section class="grid" id="teams"></section><section class="board"><h2>Live leaderboard</h2><div class="tableWrap"><table><thead><tr><th>Pos</th><th>Player</th><th>Owner</th><th>Total</th><th>Today</th><th>Thru</th><th>R1</th><th>R2</th><th>R3</th><th>R4</th></tr></thead><tbody id="leaderboard"><tr><td colspan="10">Loading…</td></tr></tbody></table></div></section><div class="status" id="status"></div></main>
<script>
const EVENT_ID = '401811952'; // ESPN's 2026 U.S. Open event id.
const ESPN = 'https://site.api.espn.com/apis/site/v2/sports/golf/pga/scoreboard';
const REFRESH_MS = 60000;
const TEAMS = [
  { owner:'James', players:['Cameron Young','J.J. Spaun','Tommy Fleetwood'], aliases:{'Cameron Young':['Cam Young'],'J.J. Spaun':['JJ Spaun','J. J. Spaun']} },
  { owner:'Luke', players:['Matt Fitzpatrick','Jon Rahm','Sam Burns'] },
  { owner:'Blake', players:['Rory McIlroy','Xander Schauffele','Bryson DeChambeau'], aliases:{'Bryson DeChambeau':['Bryson Dechambeau']} },
  { owner:'Troy', players:['Scottie Scheffler','Russell Henley','Si Woo Kim'], aliases:{'Si Woo Kim':['Si-Woo Kim','S. W. Kim']} }
];
const allPicked = new Map();
for (const t of TEAMS) for (const p of t.players) allPicked.set(norm(p), t.owner);
function norm(s){return String(s||'').normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9]/gi,'').toLowerCase()}
function scoreNum(s){ if(s==null || s==='') return null; s=String(s).trim(); if(/^E$/i.test(s)) return 0; const n=parseInt(s.replace('+',''),10); return Number.isFinite(n)?n:null; }
function fmt(n){ if(n==null) return '—'; if(n===0) return 'E'; return n>0?`+${n}`:`${n}`; }
function findPicked(row, player){
  const names = [player.fullName, player.displayName, player.shortName].filter(Boolean);
  for (const team of TEAMS) for (const target of team.players){
    const aliases = [target, ...((team.aliases && team.aliases[target]) || [])];
    if (names.some(n => aliases.some(a => norm(n)===norm(a)))) return {owner:team.owner, target};
  }
  return null;
}
async function fetchJson(url){ const r=await fetch(url,{cache:'no-store'}); if(!r.ok) throw new Error(`${r.status} ${r.statusText}`); return r.json(); }
function dateRange(){ const out=[]; for(let d=18; d<=22; d++) out.push(`202606${String(d).padStart(2,'0')}`); return out; }
async function getData(){
  const urls = [`${ESPN}?event=${EVENT_ID}`, ...dateRange().map(d=>`${ESPN}?dates=${d}`), ESPN];
  let lastErr;
  for(const url of urls){
    try{
      const data = await fetchJson(url);
      const event = (data.events||[]).find(e=>e.id===EVENT_ID) || (data.events||[]).find(e=>/u\.?s\.? open/i.test(e.name||e.shortName||''));
      if(event) return {data,event,url};
      lastErr = new Error('U.S. Open event not in this response');
    }catch(e){ lastErr=e; }
  }
  throw lastErr || new Error('No leaderboard data returned');
}
function roundScoreDisplay(line){
  if(!line) return '—';
  // ESPN commonly exposes round strokes as value/displayValue and round-to-par in displayValue on live events.
  // Keep whatever ESPN provides, but normalise empty values to a dash.
  return line.displayValue ?? line.value ?? '—';
}
function flatten(event){
  const comp = (event.competitions||[])[0] || {};
  return (comp.competitors||[]).map((c,idx)=>{
    const a=c.athlete||{};
    const lines=c.linescores||[];
    const completed=lines.filter(x=>x && (x.value!=null || x.displayValue!=null));
    const latest=completed[completed.length-1] || {};
    const stats=latest.statistics?.categories?.[0]?.stats || [];
    const thru = stats.find(s=>/thru/i.test(s.name||s.displayName||''))?.displayValue || stats[5]?.displayValue || c.status?.displayValue || '';
    const today = latest.displayValue || latest.value || c.period || '';
    const rounds = [1,2,3,4].map(n => {
      const line = lines.find(x => Number(x.period) === n) || lines[n-1];
      return roundScoreDisplay(line);
    });
    return {pos:c.curatedRank?.current || c.order || idx+1, player:a, name:a.displayName||a.fullName||'Unknown', total:scoreNum(c.score), totalRaw:c.score||'—', today, thru, rounds, picked:null};
  }).sort((a,b)=>(a.total??999)-(b.total??999) || String(a.pos).localeCompare(String(b.pos)));
}
function teamSnapshot(team, rows){
  const found = team.players.map(target => ({
    target,
    row: rows.find(r => findPicked(r, r.player)?.target === target)
  }));
  const nums = found.map(x => x.row?.total).filter(v => v != null);
  const complete = nums.length === team.players.length;
  const total = nums.reduce((a,b) => a+b, 0);
  return {team, found, nums, complete, total};
}
function renderTeams(rows){
  const root=document.getElementById('teams'); root.innerHTML='';
  const snapshots = TEAMS.map(t => teamSnapshot(t, rows)).sort((a,b) => {
    // Lowest combined tournament score leads. Incomplete teams are pushed behind complete teams.
    if (a.complete !== b.complete) return a.complete ? -1 : 1;
    return a.total - b.total || a.team.owner.localeCompare(b.team.owner);
  });
  snapshots.forEach((snap, idx) => {
    const team = snap.team;
    const card=document.createElement('article'); card.className=`team ${idx===0 && snap.complete ? 'rank1' : ''}`;
    card.innerHTML=`<div class="teamHead"><div><div class="rankBadge">#${idx+1}${idx===0 && snap.complete?' · Leader':''}</div><div class="name">${team.owner}</div></div><div class="total ${snap.complete?'':'missing'}">${snap.complete?fmt(snap.total):fmt(snap.total)+'*'}<small>combined</small></div></div><div class="players"></div>`;
    const list=card.querySelector('.players');
    for(const item of snap.found){
      const r=item.row;
      const status = r?.thru || '';
      const cutText = /cut|wd|withdraw|dq/i.test(status) ? ` · ${status}` : '';
      const div=document.createElement('div'); div.className='player';
      div.innerHTML=`<div><div class="playerName">${item.target}</div><div class="meta">${r?`Pos ${r.pos} · Today ${r.today||'—'} · Total ${fmt(r.total)}${cutText} · Rounds ${r.rounds.join(' / ')}`:'Not found in leaderboard yet'}</div></div><div class="score ${r?'':'missing'}">${r?fmt(r.total):'—'}</div>`;
      list.appendChild(div);
    }
    root.appendChild(card);
  });
}
function renderBoard(rows){
  const body=document.getElementById('leaderboard'); body.innerHTML='';
  for(const r of rows){
    r.picked = findPicked(r, r.player);
    const tr=document.createElement('tr'); if(r.picked) tr.className='mine';
    tr.innerHTML=`<td class="rank">${r.pos}</td><td><b>${r.name}</b></td><td>${r.picked?r.picked.owner:''}</td><td class="scoreCell">${fmt(r.total)}</td><td>${r.today||'—'}</td><td>${r.thru||'—'}</td><td>${r.rounds[0]}</td><td>${r.rounds[1]}</td><td>${r.rounds[2]}</td><td>${r.rounds[3]}</td>`;
    body.appendChild(tr);
  }
}
async function update(){
  const status=document.getElementById('status'); const dot=document.getElementById('liveDot');
  try{
    status.textContent='Refreshing…';
    const {event,url}=await getData();
    const rows=flatten(event);
    document.getElementById('eventTitle').textContent = `${event.name || event.shortName || 'U.S. Open'}${event.date ? ' · ' + new Date(event.date).toLocaleDateString() : ''}`;
    renderBoard(rows); renderTeams(rows);
    const now=new Date();
    document.getElementById('refreshText').textContent=`Updated ${now.toLocaleTimeString()}`;
    dot.className='dot live';
    status.innerHTML=`<span class="fine">Live data loaded.</span> Source: ESPN public scoreboard endpoint. Auto-refreshes every ${Math.round(REFRESH_MS/1000)} seconds. Team totals use each golfer's tournament total across all completed/live rounds, including players who miss the cut. Round-by-round columns show ESPN's available R1–R4 values. Missing players are excluded from a team total and marked with an asterisk.`;
  }catch(e){
    dot.className='dot';
    status.innerHTML=`<span class="error">Could not load live scores:</span> ${e.message}. This static page needs the ESPN public endpoint to be reachable from the browser and allowed by CORS.`;
  }
}
document.getElementById('refreshBtn').addEventListener('click', update);
update(); setInterval(update, REFRESH_MS);
</script>
</body>
</html>
